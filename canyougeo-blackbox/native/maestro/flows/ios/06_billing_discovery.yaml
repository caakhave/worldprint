appId: com.canyougeo.app
name: iOS native StoreKit billing discovery
tags:
  - native
  - billing
  - ios
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Can you read the world?"
    timeout: 60000
- runFlow:
    when:
      visible: "Account menu for .*"
    commands:
      - tapOn: "Account menu for .*"
      - extendedWaitUntil:
          visible: "View account"
          timeout: 15000
      - tapOn: "View account"
      - extendedWaitUntil:
          visible: "Your atlas is connected."
          timeout: 30000
      - scrollUntilVisible:
          element: "Sign out"
          direction: DOWN
      - tapOn: "Sign out"
      - extendedWaitUntil:
          visible: "You're signed out."
          timeout: 30000
- openLink: "https://canyougeo.com/upgrade/"
- extendedWaitUntil:
    visible: "Apple purchases"
    timeout: 60000
- extendedWaitUntil:
    visible: "Apple manages iOS purchases. Stripe checkout is unavailable in this iOS build."
    timeout: 30000
- extendedWaitUntil:
    visible: "Sign in before starting an Apple purchase. Free play needs no card."
    timeout: 30000
- assertNotVisible: "Stripe handles checkout securely"
- tapOn: "Start Pro"
- extendedWaitUntil:
    visible: "Create your Can You Geo? account."
    timeout: 30000
- openLink: "https://canyougeo.com/sign-in/"
- extendedWaitUntil:
    visible: "Sign in with email and password."
    timeout: 30000
- tapOn: "Email"
- eraseText
- inputText: ${MAESTRO_CGY_EMAIL}
- tapOn: "Password"
- eraseText
- inputText: ${MAESTRO_CGY_PASSWORD}
- hideKeyboard
- tapOn:
    text: "^Sign in$"
    index: 1
- extendedWaitUntil:
    visible: "Your atlas is connected."
    timeout: 45000
- openLink: "https://canyougeo.com/upgrade/"
- extendedWaitUntil:
    visible: "Apple purchases"
    timeout: 60000
- extendedWaitUntil:
    visible: "Join monthly"
    timeout: 30000
- extendedWaitUntil:
    visible: "Join yearly"
    timeout: 30000
- extendedWaitUntil:
    visible: "Restore purchases"
    timeout: 30000
- extendedWaitUntil:
    visible: 'Apple purchase catalog ready.|Apple returned no Can You Geo subscription products.|Only one Apple subscription plan was returned.|Apple purchase bridge is unavailable in this build.|Apple purchases are unavailable for the current storefront.|Apple purchases could not be loaded because of a network/system condition.|Apple product discovery timed out while checking the native bridge.|Apple product discovery timed out while requesting subscription products.'
    timeout: 30000
- runFlow:
    when:
      visible: "Apple purchase catalog ready."
    commands:
      - assertNotVisible: "Apple returned no Can You Geo subscription products."
      - assertNotVisible: "Only one Apple subscription plan was returned."
      - assertVisible: "Join monthly.*[0-9]"
      - assertVisible: "Join yearly.*[0-9]"
      - assertVisible: "Restore purchases"
- runFlow:
    when:
      visible: "Apple returned no Can You Geo subscription products."
    commands:
      - assertVisible: "Apple returned no Can You Geo subscription products."
      - assertNotVisible: "Apple purchase catalog ready."
      - assertNotVisible: "Only one Apple subscription plan was returned."
- runFlow:
    when:
      visible: "Only one Apple subscription plan was returned."
    commands:
      - assertVisible: "Only one Apple subscription plan was returned."
      - assertNotVisible: "Apple purchase catalog ready."
      - assertNotVisible: "Apple returned no Can You Geo subscription products."
- runFlow:
    when:
      visible: "Apple purchase bridge is unavailable in this build."
    commands:
      - assertVisible: "Apple purchase bridge is unavailable in this build."
      - assertNotVisible: "Apple purchase catalog ready."
- runFlow:
    when:
      visible: "Apple purchases are unavailable for the current storefront."
    commands:
      - assertVisible: "Apple purchases are unavailable for the current storefront."
      - assertNotVisible: "Apple purchase catalog ready."
- runFlow:
    when:
      visible: "Apple purchases could not be loaded because of a network/system condition."
    commands:
      - assertVisible: "Apple purchases could not be loaded because of a network/system condition."
      - assertNotVisible: "Apple purchase catalog ready."
- runFlow:
    when:
      visible: "Apple product discovery timed out while checking the native bridge."
    commands:
      - assertVisible: "Apple product discovery timed out while checking the native bridge."
      - assertNotVisible: "Apple purchase catalog ready."
- runFlow:
    when:
      visible: "Apple product discovery timed out while requesting subscription products."
    commands:
      - assertVisible: "Apple product discovery timed out while requesting subscription products."
      - assertNotVisible: "Apple purchase catalog ready."
- assertVisible: "Retry Apple purchase options"
- assertNotVisible: "Opening Apple..."
- assertNotVisible: "Manage Apple subscription"
- assertNotVisible: "Stripe handles checkout securely"
- assertNotVisible: "checkout.stripe.com"
- assertNotVisible: "billing.stripe.com"
- openLink: "https://canyougeo.com/account/"
- extendedWaitUntil:
    visible: "Your atlas is connected."
    timeout: 45000
- scrollUntilVisible:
    element: "Apple manages iOS purchases. Stripe checkout is unavailable in this iOS build."
    direction: DOWN
    timeout: 45000
- assertNotVisible: "Manage billing"
- assertNotVisible: "Stripe handles checkout securely"
- scrollUntilVisible:
    element: "Sign out"
    direction: DOWN
    timeout: 45000
- tapOn: "Sign out"
- extendedWaitUntil:
    visible: "You're signed out."
    timeout: 30000
