[pytest]
testpaths = tests
addopts = -ra
markers =
    smoke: fast public smoke checks for deployed hosts
    prod_smoke: minimal production-safe route and public copy smoke, no secrets or paid/email actions
    mobile: mobile viewport and touch-oriented checks
    auth: optional authenticated checks, skipped unless credentials are provided
    checkout_smoke: opt-in live checkout-open smoke; stops at Stripe Checkout and never completes payment
    signup_analytics: opt-in signup analytics smoke; may create a test account
    email_live: optional live email checks, never run by default
    security: security header and CSP checks
    indexing: robots, sitemap, and noindex policy checks
