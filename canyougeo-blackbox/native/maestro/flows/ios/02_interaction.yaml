appId: com.canyougeo.app
name: iOS native Pattern Atlas interaction
tags:
  - native
  - smoke
  - ios
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Can you read the world?"
    timeout: 15000
- tapOn: "Explore games"
- extendedWaitUntil:
    visible: "Choose a game."
    timeout: 15000
- scrollUntilVisible:
    element: "Play Pattern Atlas"
    direction: DOWN
- tapOn: "Play Pattern Atlas"
- extendedWaitUntil:
    visible: "Pattern Atlas Sample Run"
    timeout: 15000
- scrollUntilVisible:
    element: "PLAY Start sample run"
    direction: DOWN
- tapOn: "PLAY Start sample run"
- extendedWaitUntil:
    visible: "What pattern connects these countries?"
    timeout: 15000
- tapOn: "Countries crossed by the Tropic of Capricorn"
- extendedWaitUntil:
    visible: "Countries crossed by the Tropic of Capricorn Rejected"
    timeout: 15000
